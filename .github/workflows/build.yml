
name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v2
    - name: Setup and build
      run: |
        mkdir -p app/src/main/java/com/riderhelper
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p gradle/wrapper
        mv MainActivity.java BootReceiver.java AlertManager.java OrderDetectorService.java AlertForegroundService.java app/src/main/java/com/riderhelper/ 2>/dev/null || true
        mv AndroidManifest.xml app/src/main/ 2>/dev/null || true
        mv activity_main.xml app/src/main/res/layout/ 2>/dev/null || true
        mv strings.xml app/src/main/res/values/ 2>/dev/null || true
        mv accessibility_service_config.xml app/src/main/res/xml/ 2>/dev/null || true
        mv card_background.xml app/src/main/res/drawable/ 2>/dev/null || true
        cat > app/src/main/res/values/styles.xml << 'EOF'
        <resources><style name="Theme.RiderHelper" parent="Theme.AppCompat.Light.DarkActionBar"><item name="colorPrimary">#FF6B00</item><item name="colorPrimaryDark">#CC5500</item><item name="colorAccent">#FFA500</item></style></resources>
        EOF
        cat > app/src/main/res/values/colors.xml << 'EOF'
        <resources><color name="colorPrimary">#FF6B00</color></resources>
        EOF
        cat > app/src/main/res/mipmap-hdpi/ic_launcher.xml << 'EOF'
        <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/colorPrimary"/></adaptive-icon>
        EOF
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-hdpi/ic_launcher_round.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher.xml
        cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher_round.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><uses-permission android:name="android.permission.VIBRATE"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.POST_NOTIFICATIONS"/><uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/><uses-permission android:name="android.permission.WAKE_LOCK"/><application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="Rider Helper" android:roundIcon="@mipmap/ic_launcher_round" android:supportsRtl="true" android:theme="@style/Theme.RiderHelper"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><service android:name=".OrderDetectorService" android:exported="true" android:label="Chowdeck Order Detector" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE"><intent-filter><action android:name="android.accessibilityservice.AccessibilityService"/></intent-filter><meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config"/></service><receiver android:name=".BootReceiver" android:exported="true"><intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/></intent-filter></receiver></application></manifest>
        EOF
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
        export PATH="/tmp/gradle-dist/gradle-8.2/bin:$PATH"
        cat > build.gradle << 'EOF'
        buildscript {
          repositories { google(); mavenCentral() }
          dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        echo "rootProject.name='RiderHelper'" > settings.gradle
        echo "include ':app'" >> settings.gradle
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
          namespace 'com.riderhelper'
          compileSdk 34
          defaultConfig {
            applicationId "com.riderhelper"
            minSdk 26
            targetSdk 34
            versionCode 1
            versionName "1.0"
          }
          compileOptions {
            sourceCompatibility JavaVersion.VERSION_1_8
            targetCompatibility JavaVersion.VERSION_1_8
          }
        }
        dependencies {
          implementation 'androidx.appcompat:appcompat:1.6.1'
          implementation 'com.google.android.material:material:1.11.0'
          implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        gradle assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: RiderHelper-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
```
