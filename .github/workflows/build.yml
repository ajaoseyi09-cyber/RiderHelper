name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v2
      - name: Build APK
        run: |
          mkdir -p app/src/main/java/com/riderhelper
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p gradle/wrapper
          mv MainActivity.java BootReceiver.java AlertManager.java OrderDetectorService.java AlertForegroundService.java app/src/main/java/com/riderhelper/ 2>/dev/null || true
          mv AndroidManifest.xml app/src/main/ 2>/dev/null || true
          mv activity_main.xml app/src/main/res/layout/ 2>/dev/null || true
          mv strings.xml app/src/main/res/values/ 2>/dev/null || true
          mv accessibility_service_config.xml app/src/main/res/xml/ 2>/dev/null || true
          mv card_background.xml app/src/main/res/drawable/ 2>/dev/null || true
          echo '<resources><style name="Theme.RiderHelper" parent="Theme.AppCompat.Light.DarkActionBar"><item name="colorPrimary">#FF6B00</item><item name="colorPrimaryDark">#CC5500</item><item name="colorAccent">#FFA500</item></style></resources>' > app/src/main/res/values/styles.xml
          echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/colorPrimary"/></adaptive-icon>' > app/src/main/res/mipmap-hdpi/ic_launcher.xml
          cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-hdpi/ic_launcher_round.xml
          cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher.xml
          cp app/src/main/res/mipmap-hdpi/ic_launcher.xml app/src/main/res/mipmap-mdpi/ic_launcher_round.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#FF6B00</color></resources>' > app/src/main/res/values/colors.xml
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH="/tmp/gradle-dist/gradle-8.2/bin:$PATH"
          echo 'buildscript{repositories{google();mavenCentral()};dependencies{classpath "com.android.tools.build:gradle:8.2.0"}}allprojects{repositories{google();mavenCentral()}}' > build.gradle
          echo 'rootProject.name="RiderHelper";include(":app")' > settings.gradle
          echo 'apply plugin:"com.android.application";android{namespace "com.riderhelper";compileSdk 34;defaultConfig{applicationId "com.riderhelper";minSdk 26;targetSdk 34;versionCode 1;versionName "1.0"};compileOptions{sourceCompatibility JavaVersion.VERSION_1_8;targetCompatibility JavaVersion.VERSION_1_8}};dependencies{implementation "androidx.appcompat:appcompat:1.6.1";implementation "com.google.android.material:material:1.11.0";implementation "androidx.constraintlayout:constraintlayout:2.1.4"}' > app/build.gradle
          echo 'android.useAndroidX=true' > gradle.properties
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: RiderHelper-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
